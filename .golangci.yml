version: "2"

formatters:
  enable:
    - gofumpt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true

issues:
  max-same-issues: 0
